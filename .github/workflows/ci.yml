name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SnippetFlow
    steps:
      - name: Checkout SnippetFlow
        uses: actions/checkout@v4
        with:
          path: SnippetFlow
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: SnippetFlow/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  rust-egui:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SnippetFlow
    steps:
      - name: Checkout SnippetFlow
        uses: actions/checkout@v4
        with:
          path: SnippetFlow
      - name: Checkout common_lib
        uses: actions/checkout@v4
        with:
          repository: tkshnkgwr/common_lib
          path: common_lib
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            SnippetFlow/target/
          key: ${{ runner.os }}-cargo-egui-${{ hashFiles('SnippetFlow/**/Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test

  rust-tauri:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SnippetFlow
    steps:
      - name: Checkout SnippetFlow
        uses: actions/checkout@v4
        with:
          path: SnippetFlow
      - name: Checkout common_lib
        uses: actions/checkout@v4
        with:
          repository: tkshnkgwr/common_lib
          path: common_lib
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Node dependencies
        run: npm ci
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            SnippetFlow/src-tauri/target/
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('SnippetFlow/src-tauri/Cargo.lock') }}
      - name: Check formatting (Tauri)
        run: |
          cd src-tauri
          cargo fmt --check
      - name: Run clippy (Tauri)
        run: |
          cd src-tauri
          cargo clippy --all-targets -- -D warnings
